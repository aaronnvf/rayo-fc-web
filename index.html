<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Rayo FC</title>
  <link rel="icon" type="image/png" href="images/logoo.png"/>

  <!-- Configuración para diseño adaptable en dispositivos móviles -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Hoja de estilos principal -->
  <link rel="stylesheet" href="MiPaginaCSS.css">

  <!-- Tipografías externas de Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Anton&display=swap" rel="stylesheet">
</head>

<body>

<!-- ENCABEZADO -->
<header>

  <!-- Barras decorativas superior e inferior -->
  <div class="barra-superior"></div>

  <div class="header-principal">

    <!-- Logotipo del club -->
    <div class="logo">
      <img src="images/logorayo.png" alt="Logotipo del Rayo FC">
    </div>

    <!-- Navegación principal del sitio -->
    <nav aria-label="Navegación principal">
      <ul>
        <li><a href="index.html" class="active">INICIO</a></li>
        <li><a href="equipo.html">CLASIFICACION</a></li>
        <li><a href="partidos.html">PARTIDOS</a></li>
        <li><a href="jugadores.html">JUGADORES</a></li>
      </ul>

      <!-- Enlace a redes sociales -->
      <div class="header-social">
        <a href="https://www.instagram.com/rayofctnf/" target="_blank" rel="noopener" aria-label="Instagram del Rayo FC">
          <img src="images/instagram.png" alt="Instagram Rayo FC">
        </a>
      </div>
    </nav>

  </div>

  <div class="barra-inferior"></div>
</header>

<!-- CONTENIDO PRINCIPAL -->
<main class="partidos-page">

  <!-- Sección hero con imagen de fondo y texto superpuesto -->
  <section class="hero" aria-label="Imagen de la plantilla del Rayo FC">
    <div class="hero-overlay"></div>
    <div class="hero-texto">
      <h1>PRIMER EQUIPO</h1>
    </div>
  </section>

  <section class="siguiente-partido">
    <h2>SIGUIENTE PARTIDO</h2>

    <div id="proximos-partidos"></div>
  </section>

  <!-- Sección de patrocinadores -->
  <section class="patrocinadores">
    <div class="patrocinadores-linea">
      <h2>Patrocinadores oficiales</h2>

      <div class="patrocinadores-logos">
        <a href="https://www.lospinchitossanandres.com/es/restaurants/los-pinchitos" target="_blank" rel="noopener">
          <img src="images/pinchito.png" alt="Logotipo de Los Pinchitos">
        </a>
      </div>
    </div>
  </section>

</main>

<!-- PIE DE PÁGINA -->
<footer class="footer">
  <div class="footer-contenido">

    <!-- Identidad del club -->
    <div class="footer-identidad">
      <img src="images/logorayo.png" alt="Logotipo Rayo FC">

      <div class="footer-texto">
        <h3>RAYO FC</h3>
        <p>© Rayo FC</p>
        <p>Página oficial del Rayo FC</p>
      </div>
    </div>

    <!-- Información adicional -->
    <div class="footer-info">
      <p>Club de Fútbol 7 · Liga La Amistad · Tenerife</p>
    </div>

    <!-- Contacto -->
    <div class="footer-redes">
      <a href="tel:+34643823484" aria-label="Llamar por teléfono al Rayo FC">
        CONTACTO
      </a>
    </div>

  </div>
</footer>

<script>
async function cargarProximosRayo(){

const res = await fetch("https://rayo-api-ten.vercel.app/api/clasificacion");
const data = await res.json();
const matches = data.matches;

const ahora = new Date();

/* partidos del Rayo ordenados por fecha */

const partidosRayo = matches
.filter(m => m.homeTeam.id === 3125 || m.visitorTeam.id === 3125)
.sort((a,b)=> new Date(a.startTime) - new Date(b.startTime));

/* encontrar el siguiente partido */

const index = partidosRayo.findIndex(m => new Date(m.startTime) > ahora);

/* coger los 3 siguientes del calendario */

const proximos = partidosRayo.slice(index, index + 1);

const contenedor = document.getElementById("proximos-partidos");
contenedor.innerHTML="";

proximos.forEach(match=>{

const home = match.homeTeam.name.trim().replace(/"/g,"");
const away = match.visitorTeam.name.trim().replace(/"/g,"");

const fecha = new Date(match.startTime);

const hora = fecha.toLocaleTimeString("es-ES",{hour:'2-digit',minute:'2-digit'});
const dia = fecha.toLocaleDateString("es-ES",{day:'numeric',month:'long'});
const campo = match.field.name;

contenedor.innerHTML += `

<article class="partido-card">

<div class="partido-contenido">

<div class="equipo-prox">
<img src="images/equipo/${home}.png">
<span>${home}</span>
</div>

<div class="vs-prox">VS</div>

<div class="equipo-prox">
<img src="images/equipo/${away}.png">
<span>${away}</span>
</div>

</div>

<div class="hover-info">
<p>📅 ${dia}</p>
<p>🕒 ${hora}</p>
<p>📍 ${campo}</p>
</div>

</article>

`;

});

}

cargarProximosRayo();
</script>

</body>
<!-- update -->
</html>
