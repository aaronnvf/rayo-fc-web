<script>

const clausuraURL =
"https://corsproxy.io/?https://futbol7amistad.com/api/teams/3125/details/191";

const aperturaURL =
"https://corsproxy.io/?https://futbol7amistad.com/api/teams/2737/details/162";

// 🔹 Fetch con timeout
function fetchConTimeout(url, timeout = 7000){
  return Promise.race([
    fetch(url, { cache: "no-store" }),
    new Promise((_, reject) =>
      setTimeout(() => reject("Timeout"), timeout)
    )
  ]);
}

// 🔹 Reintentos automáticos
async function fetchConReintento(url, intentos = 3){
  for(let i = 0; i < intentos; i++){
    try{
      const res = await fetchConTimeout(url);
      return await res.json();
    }catch(e){
      console.log(`Intento ${i+1} fallido`);
      if(i === intentos - 1) throw e;
    }
  }
}

// 🔹 Cargar datos
async function cargarDatos(url){

  // Mostrar loading
  document.querySelectorAll(".stat-value").forEach(e => e.textContent = "...");
  document.querySelectorAll(".mvp-count").forEach(e => e.textContent = "...");

  try{

    const data = await fetchConReintento(url);

    if(!data.players){
      console.log("No hay players");
      return;
    }

    data.players.forEach(player => {

      const nombre = player.name.trim();
      const goles = player.dayResultSummary?.points || 0;
      const mvps = player.dayResultSummary?.mvpPoints || 0;

      const card = document.querySelector(`[data-player="${nombre}"]`);

      if(card){
        card.querySelector(".stat-value").textContent = goles;
        card.querySelector(".mvp-count").textContent = mvps;
      }

    });

  }catch(err){
    console.log("Error final:", err);

    // Mostrar error visual
    document.querySelectorAll(".stat-value").forEach(e => e.textContent = "0");
    document.querySelectorAll(".mvp-count").forEach(e => e.textContent = "0");
  }

}

// 🔹 Botones
const btnClausura = document.getElementById("btn-clausura");
const btnApertura = document.getElementById("btn-apertura");

btnClausura.onclick = () => {
  btnClausura.classList.add("activo");
  btnApertura.classList.remove("activo");
  cargarDatos(clausuraURL);
};

btnApertura.onclick = () => {
  btnApertura.classList.add("activo");
  btnClausura.classList.remove("activo");
  cargarDatos(aperturaURL);
};

// 🔹 Carga inicial
cargarDatos(clausuraURL);

</script>
